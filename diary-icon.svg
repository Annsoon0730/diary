<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <rect width="1024" height="1024" fill="#f9f7f4"/>
  
  <!-- Abstract open book: two gentle curved pages meeting at spine -->
  <g fill="none" stroke="#c8bfb0" stroke-linecap="round" stroke-linejoin="round">
    
    <!-- Left page -->
    <path 
      d="M512 420 C490 418, 430 422, 390 434 C360 444, 342 458, 338 478 C336 492, 338 530, 340 560 C342 582, 348 598, 360 606 C380 618, 430 614, 470 610 C492 608, 506 604, 512 600"
      stroke="#b8ad9e" stroke-width="11" fill="#f4f0ea" opacity="0.9"
    />
    
    <!-- Right page -->
    <path 
      d="M512 420 C534 418, 594 422, 634 434 C664 444, 682 458, 686 478 C688 492, 686 530, 684 560 C682 582, 676 598, 664 606 C644 618, 594 614, 554 610 C532 608, 518 604, 512 600"
      stroke="#b8ad9e" stroke-width="11" fill="#f4f0ea" opacity="0.9"
    />
    
    <!-- Spine line -->
    <line x1="512" y1="420" x2="512" y2="600" stroke="#c8bfb0" stroke-width="9"/>
    
    <!-- Delicate lines on left page (text suggestion) -->
    <line x1="392" y1="468" x2="494" y2="463" stroke="#d4ccc2" stroke-width="6" opacity="0.7"/>
    <line x1="388" y1="493" x2="490" y2="489" stroke="#d4ccc2" stroke-width="6" opacity="0.7"/>
    <line x1="386" y1="518" x2="488" y2="515" stroke="#d4ccc2" stroke-width="6" opacity="0.5"/>
    <line x1="386" y1="543" x2="460" y2="540" stroke="#d4ccc2" stroke-width="6" opacity="0.4"/>
    
    <!-- Delicate lines on right page (text suggestion) -->
    <line x1="530" y1="463" x2="632" y2="468" stroke="#d4ccc2" stroke-width="6" opacity="0.7"/>
    <line x1="534" y1="489" x2="636" y2="493" stroke="#d4ccc2" stroke-width="6" opacity="0.7"/>
    <line x1="536" y1="515" x2="638" y2="518" stroke="#d4ccc2" stroke-width="6" opacity="0.5"/>
    <line x1="564" y1="540" x2="638" y2="543" stroke="#d4ccc2" stroke-width="6" opacity="0.4"/>

  </g>
</svg>
